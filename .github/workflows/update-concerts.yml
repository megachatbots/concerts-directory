name: Update Concert Directory

on:
  schedule:
    # Daily at 6:00 AM UTC (midnight CDMX, CST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and update concert data
        run: python scrapers/update_concerts.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/songkick_concerts.json docs/data/songkick_concerts.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update concert data $(date -u +%Y-%m-%d)"
          git push
