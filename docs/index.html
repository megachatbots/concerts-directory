<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDMX Concerts</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #222;
  --text: #e8e8e8;
  --text-dim: #888;
  --accent: #ff4d4d;
  --accent-dim: #cc3333;
  --tag-bg: #1a1a2e;
  --tag-text: #8888cc;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  padding: 2rem 1.5rem 1rem;
  max-width: 900px;
  margin: 0 auto;
}
.header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header h1 span { color: var(--accent); }
.header .subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
  margin-top: 0.3rem;
}
.controls {
  max-width: 900px;
  margin: 0 auto;
  padding: 0.75rem 1.5rem;
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.controls input, .controls select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.5rem 0.75rem;
  border-radius: 6px;
  font-size: 0.85rem;
  outline: none;
}
.controls input:focus, .controls select:focus {
  border-color: var(--accent);
}
.controls input[type="text"] { flex: 1; min-width: 200px; }
.controls input[type="month"] { width: 160px; }
.controls select { min-width: 150px; }
.count {
  max-width: 900px;
  margin: 0 auto;
  padding: 0.5rem 1.5rem;
  color: var(--text-dim);
  font-size: 0.8rem;
}
.concerts {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
}
.date-group {
  margin-top: 1.5rem;
}
.date-header {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  font-weight: 600;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.5rem;
  position: sticky;
  top: 49px;
  background: var(--bg);
  z-index: 5;
  padding-top: 0.4rem;
}
.concert-card {
  padding: 0.7rem 0;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}
.concert-card:last-child { border-bottom: none; }
.concert-info { flex: 1; min-width: 0; }
.concert-artist {
  font-weight: 600;
  font-size: 1rem;
  line-height: 1.3;
}
.concert-artist a {
  color: var(--text);
  text-decoration: none;
}
.concert-artist a:hover {
  color: var(--accent);
}
.concert-venue {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.15rem;
}
.concert-venue a {
  color: var(--text-dim);
  text-decoration: none;
}
.concert-venue a:hover { text-decoration: underline; }
.concert-tags {
  display: flex;
  gap: 0.4rem;
  flex-shrink: 0;
  align-items: center;
}
.tag {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.2rem 0.5rem;
  border-radius: 3px;
  background: var(--tag-bg);
  color: var(--tag-text);
  font-weight: 500;
}
.tag.outdoor {
  background: #1a2e1a;
  color: #88cc88;
}
.no-results {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-dim);
}
.footer {
  max-width: 900px;
  margin: 0 auto;
  padding: 1rem 1.5rem 2rem;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
}
.footer a { color: var(--text-dim); }
@media (max-width: 600px) {
  .header h1 { font-size: 1.5rem; }
  .controls { flex-direction: column; }
  .controls input[type="text"] { min-width: unset; }
  .concert-card { flex-direction: column; gap: 0.3rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>CDMX <span>Concerts</span></h1>
  <div class="subtitle" id="subtitle">Loading...</div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search artist or venue...">
  <input type="month" id="month-filter">
  <select id="venue-filter">
    <option value="">All venues</option>
  </select>
</div>

<div class="count" id="count"></div>
<div class="concerts" id="concerts"></div>

<div class="footer">
  Data from <a href="https://www.songkick.com/metro-areas/34385-mexico-mexico-city" target="_blank">Songkick</a> &middot;
  Last updated <span id="updated"></span>
</div>

<script>
let allConcerts = [];
let venues = [];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return `${DAYS[dt.getDay()]}, ${MONTHS[dt.getMonth()]} ${d}`;
}

function formatDateShort(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return `${DAYS[dt.getDay()].slice(0,3)}, ${MONTHS[dt.getMonth()].slice(0,3)} ${d}, ${y}`;
}

async function init() {
  try {
    const res = await fetch('data/songkick_concerts.json');
    const data = await res.json();
    allConcerts = data.concerts;

    // Populate subtitle
    const first = allConcerts[0]?.date;
    const last = allConcerts[allConcerts.length - 1]?.date;
    document.getElementById('subtitle').textContent =
      `${data.total_concerts} concerts · ${formatDateShort(first)} – ${formatDateShort(last)}`;

    // Updated timestamp
    const scraped = new Date(data.scraped_at);
    document.getElementById('updated').textContent = scraped.toLocaleDateString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric'
    });

    // Populate venue filter
    const venueSet = new Set();
    allConcerts.forEach(c => { if (c.venue) venueSet.add(c.venue); });
    venues = [...venueSet].sort();
    const venueSelect = document.getElementById('venue-filter');
    venues.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      venueSelect.appendChild(opt);
    });

    // Set month filter default to first concert's month
    if (first) {
      document.getElementById('month-filter').value = first.slice(0, 7);
    }

    render();
  } catch (e) {
    document.getElementById('concerts').innerHTML =
      '<div class="no-results">Failed to load concert data.</div>';
  }
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const monthVal = document.getElementById('month-filter').value; // "2026-07"
  const venueVal = document.getElementById('venue-filter').value;

  let filtered = allConcerts.filter(c => {
    if (query) {
      const haystack = (c.artist_display + ' ' + (c.venue || '') + ' ' + c.artists.join(' ')).toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    if (monthVal && !c.date.startsWith(monthVal)) return false;
    if (venueVal && c.venue !== venueVal) return false;
    return true;
  });

  document.getElementById('count').textContent = `${filtered.length} concert${filtered.length !== 1 ? 's' : ''}`;

  // Group by date
  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.date]) groups[c.date] = [];
    groups[c.date].push(c);
  });

  const container = document.getElementById('concerts');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No concerts match your filters.</div>';
    return;
  }

  let html = '';
  Object.keys(groups).sort().forEach(date => {
    html += `<div class="date-group">`;
    html += `<div class="date-header">${formatDate(date)}</div>`;
    groups[date].forEach(c => {
      const artistHtml = c.url
        ? `<a href="${c.url}" target="_blank">${esc(c.artist_display)}</a>`
        : esc(c.artist_display);

      const venueHtml = c.venue_url
        ? `<a href="${c.venue_url}" target="_blank">${esc(c.venue)}</a>`
        : esc(c.venue || '');

      let tagsHtml = '';
      if (c.tags && c.tags.length) {
        tagsHtml = '<div class="concert-tags">' +
          c.tags.map(t => `<span class="tag ${t.toLowerCase()}">${t}</span>`).join('') +
          '</div>';
      }

      html += `<div class="concert-card">
        <div class="concert-info">
          <div class="concert-artist">${artistHtml}</div>
          <div class="concert-venue">${venueHtml}</div>
        </div>
        ${tagsHtml}
      </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('month-filter').addEventListener('change', render);
document.getElementById('venue-filter').addEventListener('change', render);

init();
</script>

</body>
</html>
